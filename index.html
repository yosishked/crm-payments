<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ניהול תשלומים</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ===================== Auth Screen ===================== -->
  <div id="auth-view" class="auth-view">
    <div class="auth-card">
      <div class="auth-logo">💰</div>
      <h1 class="auth-title">ניהול תשלומים</h1>
      <p class="auth-subtitle">מערכת תשלומים</p>
      <button id="google-sign-in-btn" class="btn btn-google">
        <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        התחבר עם Google
      </button>
    </div>
  </div>

  <!-- ===================== App Shell ===================== -->
  <div id="app-shell" class="app-shell" hidden>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar collapsed">
      <div class="sidebar-header">
        <svg class="sidebar-logo-icon" viewBox="0 0 24 24" width="28" height="28"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor" transform="scale(0.7) translate(5,5)"/></svg>
        <span class="sidebar-title">CRM</span>
      </div>

      <nav class="sidebar-nav">
        <!-- מודול תשלומים — פנימי -->
        <a class="nav-item active" data-route="clients" href="#clients">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14c1.1 0 2 .9 2 2v1h-9a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z" fill="currentColor"/></svg>
          <span class="nav-label">לקוחות</span>
        </a>
        <a class="nav-item" data-route="editors" href="#editors">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/></svg>
          <span class="nav-label">עורכות</span>
        </a>
        <a class="nav-item" data-route="photographers" href="#photographers">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3z" fill="currentColor"/></svg>
          <span class="nav-label">צלמים</span>
        </a>

        <a class="nav-item" id="nav-audit-history" href="#" onclick="event.preventDefault();AuditLog.showHistory(['crm_client_transactions','crm_editor_transactions','crm_editor_offsets'])" style="display:none;">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" fill="currentColor"/></svg>
          <span class="nav-label">היסטוריה</span>
        </a>

        <div class="nav-divider"></div>

        <!-- מודולים חיצוניים -->
        <a class="nav-item nav-external" id="nav-link-leads" href="https://crm.yossishaked.net">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/></svg>
          <span class="nav-label">לידים</span>
        </a>
        <a class="nav-item nav-external" id="nav-link-editing" href="https://editing.yossishaked.net">
          <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="6" cy="6" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8.12 8.12 12 12" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20 4 8.12 15.88" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M14.8 14.8 20 20" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span class="nav-label">עריכות</span>
        </a>
        <a class="nav-item nav-external" href="https://team.yossishaked.net">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" fill="currentColor"/></svg>
          <span class="nav-label">הגדרות</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <img id="user-photo" class="user-avatar" src="" alt="" hidden>
          <div style="display:flex;flex-direction:column;gap:2px">
            <span id="user-name" class="user-name"></span>
            <span id="user-role" style="font-size:11px;color:var(--text-secondary);"></span>
          </div>
        </div>
        <button id="sign-out-btn" class="btn-sign-out" title="התנתק">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" fill="currentColor"/></svg>
        </button>
      </div>
    </aside>
    <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')" title="כווץ/הרחב">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Clients Section -->
      <div class="views-container split-view" id="clients-split">
        <div class="split-panel split-panel-list">
          <div id="clients-view" class="crm-view"></div>
        </div>
        <div class="split-panel split-panel-detail">
          <div id="client-detail-view" class="crm-view"></div>
        </div>
      </div>

      <!-- Editors Section -->
      <div class="views-container split-view" id="editors-split" hidden>
        <div class="split-panel split-panel-list">
          <div id="editors-view" class="crm-view"></div>
        </div>
        <div class="split-panel split-panel-detail">
          <div id="editor-detail-view" class="crm-view"></div>
        </div>
      </div>

      <!-- Photographers Section -->
      <div class="views-container split-view" id="photographers-split" hidden>
        <div class="split-panel split-panel-list">
          <div id="photographers-view" class="crm-view"></div>
        </div>
        <div class="split-panel split-panel-detail">
          <div id="photographer-detail-view" class="crm-view"></div>
        </div>
      </div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="mobile-nav">
      <a class="mobile-nav-item active" data-route="clients" href="#clients">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M21 18v1c0 1.1-.9 2-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14c1.1 0 2 .9 2 2v1h-9a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z" fill="currentColor"/></svg>
        <span>לקוחות</span>
      </a>
      <a class="mobile-nav-item" data-route="editors" href="#editors">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/></svg>
        <span>עורכות</span>
      </a>
      <a class="mobile-nav-item" data-route="photographers" href="#photographers">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" fill="currentColor"/></svg>
        <span>צלמים</span>
      </a>
      <a class="mobile-nav-item" id="mobile-link-leads" href="https://crm.yossishaked.net">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/></svg>
        <span>לידים</span>
      </a>
      <a class="mobile-nav-item" id="mobile-link-editing" href="https://editing.yossishaked.net">
        <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="6" cy="6" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8.12 8.12 12 12M20 4 8.12 15.88M14.8 14.8 20 20" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <span>עריכות</span>
      </a>
    </nav>
  </div>

  <!-- Toast -->
  <div id="crm-toast" class="crm-toast" hidden></div>

  <!-- Scripts -->
  <script>window.CRM_MODULE = 'crm-payments';</script>
  <script src="js/supabase-config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui-components.js"></script>
  <script src="js/router.js"></script>
  <script src="js/api.js"></script>
  <script src="js/audit.js"></script>
  <script src="js/form-helpers.js"></script>
  <script src="js/editors.js"></script>
  <script src="js/clients.js"></script>
  <script src="js/photographers.js"></script>
  <script src="js/realtime.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
